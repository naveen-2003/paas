# postgres-values.yaml
# helm install postgres bitnami/postgresql -n paas-system -f postgres-values.yaml

auth:
  username: paas
  password: paas1234
  database: paasdb

primary:
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

readReplicas:
  replicaCount: 0