# redis-values.yaml
# helm install redis bitnami/redis -n paas-system -f redis-values.yaml

auth:
  enabled: false

master:
  persistence:
    enabled: true
    size: 512Mi
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

replica:
  replicaCount: 0